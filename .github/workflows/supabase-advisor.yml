name: Supabase Advisor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  advisor:
    runs-on: ubuntu-latest
    steps:
      - name: Check Supabase Security Advisors
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          response=$(curl -sS --connect-timeout 10 --max-time 60 \
            --retry 3 --retry-delay 2 --retry-all-errors \
            -w "\n%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/fowxrnfttrnvogssaqef/advisors/security")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "ERROR: Supabase API returned HTTP $http_code"
            echo "$body"
            exit 1
          fi

          echo "=== Security Advisors ==="
          echo "$body" | jq -r '.lints[] | "[\(.level)] \(.title): \(.detail)"'

          errors=$(echo "$body" | jq '[.lints[] | select(.level == "ERROR")] | length')
          if [ "$errors" -gt 0 ]; then
            echo "ERROR: $errors error-level security advisor(s) found."
            exit 1
          fi

      - name: Check Supabase Performance Advisors
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          response=$(curl -sS --connect-timeout 10 --max-time 60 \
            --retry 3 --retry-delay 2 --retry-all-errors \
            -w "\n%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/fowxrnfttrnvogssaqef/advisors/performance")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "ERROR: Supabase API returned HTTP $http_code"
            echo "$body"
            exit 1
          fi

          echo "=== Performance Advisors ==="
          echo "$body" | jq -r '.lints[] | "[\(.level)] \(.title): \(.detail)"'

          errors=$(echo "$body" | jq '[.lints[] | select(.level == "ERROR")] | length')
          if [ "$errors" -gt 0 ]; then
            echo "ERROR: $errors error-level performance advisor(s) found."
            exit 1
          fi
