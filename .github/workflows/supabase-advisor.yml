name: Supabase Advisor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  advisor:
    runs-on: ubuntu-latest
    steps:
      - name: Check Supabase Security Advisors
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          response=$(curl -sf \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/fowxrnfttrnvogssaqef/advisors/security")

          echo "=== Security Advisors ==="
          echo "$response" | jq -r '.lints[] | "[\(.level)] \(.title): \(.detail)"'

          errors=$(echo "$response" | jq '[.lints[] | select(.level == "ERROR")] | length')
          if [ "$errors" -gt 0 ]; then
            echo "ERROR: $errors error-level security advisor(s) found."
            exit 1
          fi

      - name: Check Supabase Performance Advisors
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          response=$(curl -sf \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/fowxrnfttrnvogssaqef/advisors/performance")

          echo "=== Performance Advisors ==="
          echo "$response" | jq -r '.lints[] | "[\(.level)] \(.title): \(.detail)"'

          errors=$(echo "$response" | jq '[.lints[] | select(.level == "ERROR")] | length')
          if [ "$errors" -gt 0 ]; then
            echo "ERROR: $errors error-level performance advisor(s) found."
            exit 1
          fi
